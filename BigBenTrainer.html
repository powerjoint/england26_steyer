<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Big Ben Trainer</title>
<style>
:root{
  --gold:#c9a84c;--gold-light:#f0d882;--gold-dim:#7a5f28;
  --green:#4ade80;--red:#f87171;--blue:#7dd3fc;
  --txt:#fff8e8;--muted:#bbb5a0;
  --uk-blue:#012169;--uk-red:#C8102E;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;font-family:Georgia,'Times New Roman',serif;color:var(--txt);user-select:none;-webkit-user-select:none;touch-action:manipulation;}
body{
  background-color:var(--uk-blue);
  background-image:
    linear-gradient(to bottom right,transparent calc(50% - 9px),#fff calc(50% - 9px),#fff calc(50% + 9px),transparent calc(50% + 9px)),
    linear-gradient(to bottom left, transparent calc(50% - 9px),#fff calc(50% - 9px),#fff calc(50% + 9px),transparent calc(50% + 9px)),
    linear-gradient(to bottom right,transparent calc(50% - 5px),var(--uk-red) calc(50% - 5px),var(--uk-red) calc(50% + 5px),transparent calc(50% + 5px)),
    linear-gradient(to bottom left, transparent calc(50% - 5px),var(--uk-red) calc(50% - 5px),var(--uk-red) calc(50% + 5px),transparent calc(50% + 5px)),
    linear-gradient(#fff,#fff),linear-gradient(#fff,#fff),
    linear-gradient(var(--uk-red),var(--uk-red)),linear-gradient(var(--uk-red),var(--uk-red)),
    linear-gradient(var(--uk-blue),var(--uk-blue));
  background-size:100% 100%,100% 100%,100% 100%,100% 100%,100% 18%,22% 100%,100% 10%,13% 100%,100% 100%;
  background-position:center;background-repeat:no-repeat;
}
body::before{content:'';position:fixed;inset:0;z-index:0;background:rgba(0,8,38,.74);pointer-events:none;}
#por{position:fixed;inset:0;z-index:9999;background:rgba(0,5,25,.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .4s;}
#por.hide{opacity:0;pointer-events:none;}
.ri{width:76px;height:76px;border:3px solid var(--gold);border-radius:14px;position:relative;animation:rh 2s ease-in-out infinite;}
.ri::after{content:'↻';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:38px;color:var(--gold);}
@keyframes rh{0%,100%{transform:rotate(0)}50%{transform:rotate(-90deg)}}
#por p{font-size:1.25rem;color:var(--gold-light);text-align:center;padding:0 24px;}
#app{position:relative;z-index:1;width:100%;height:100%;display:flex;flex-direction:row;overflow:hidden;}
#sb{flex-shrink:0;width:128px;display:flex;flex-direction:column;gap:6px;background:rgba(0,10,40,.87);border-right:1px solid rgba(201,168,76,.35);padding:7px;box-shadow:2px 0 18px rgba(0,0,0,.55);}
#sb-logo{display:flex;flex-direction:column;align-items:center;gap:3px;padding-bottom:6px;border-bottom:1px solid rgba(201,168,76,.22);}
#sb-logo svg{width:26px;height:34px;}
.lt{font-size:.6rem;color:var(--gold-light);text-align:center;letter-spacing:.05em;text-shadow:0 0 8px rgba(201,168,76,.5);line-height:1.35;}
.ls{font-size:.44rem;color:var(--muted);text-align:center;font-style:italic;}
.hint{font-size:.58rem;color:var(--muted);text-align:center;line-height:1.4;padding:2px 0;}
.btn{width:100%;padding:8px 4px;border:1px solid var(--gold-dim);border-radius:10px;background:linear-gradient(160deg,rgba(28,48,90,.95),rgba(10,22,55,.95));color:var(--gold-light);font-family:Georgia,serif;font-size:.71rem;letter-spacing:.03em;cursor:pointer;touch-action:manipulation;box-shadow:0 2px 8px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06);text-align:center;line-height:1.45;-webkit-appearance:none;appearance:none;}
.btn:active{opacity:.8;}
.btn.am{border-color:var(--gold);background:linear-gradient(160deg,rgba(55,88,155,.95),rgba(28,55,115,.95));box-shadow:0 0 12px rgba(201,168,76,.35);}
#status{font-size:.6rem;text-align:center;line-height:1.45;padding:4px 2px;border-top:1px solid rgba(201,168,76,.15);min-height:34px;display:flex;align-items:center;justify-content:center;}
#status.ok{color:var(--green);}#status.err{color:var(--red);}#status.inf{color:var(--gold-light);}
#dots{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;padding:2px 0;}
.dot{width:9px;height:9px;border-radius:50%;background:#172040;border:1px solid #253060;transition:all .3s;}
.dot.done{background:var(--green);border-color:var(--green);box-shadow:0 0 5px rgba(74,222,128,.5);}
.dot.cur{background:var(--blue);border-color:var(--blue);box-shadow:0 0 7px rgba(125,211,252,.6);animation:pd .8s ease-in-out infinite;}
@keyframes pd{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.sp{flex:1;}
#kw{flex:1;display:flex;align-items:stretch;padding:5px 5px 8px 5px;position:relative;overflow:hidden;}
#kb{position:relative;display:flex;flex-direction:row;width:100%;height:100%;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.75);}
.wk{position:relative;flex:1;background:linear-gradient(180deg,#faf7f0 0%,#eee8da 45%,#d9d2c3 100%);border:1px solid #aaa;border-top:none;border-radius:0 0 8px 8px;cursor:pointer;touch-action:manipulation;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:8px;overflow:visible;box-shadow:inset 0 -4px 8px rgba(0,0,0,.08),2px 4px 10px rgba(0,0,0,.35);transition:background .07s,transform .07s;}
.wk::before{content:'';position:absolute;top:0;left:0;right:0;height:26%;background:linear-gradient(180deg,rgba(255,255,255,.5) 0%,transparent 100%);pointer-events:none;}
.wk.pr{background:linear-gradient(180deg,#d5cfc0 0%,#c2bcac 45%,#aeaa98 100%)!important;transform:scaleY(.975) translateY(2px)!important;}
.wk.hl{background:linear-gradient(180deg,#a8d4ff 0%,#7eb8f0 45%,#5ea0e0 100%)!important;box-shadow:0 0 18px rgba(125,211,252,.7)!important;}
.wk.cf{background:linear-gradient(180deg,#9ef0bc 0%,#5ed885 45%,#3ec068 100%)!important;box-shadow:0 0 18px rgba(74,222,128,.7)!important;}
.wk.wf{background:linear-gradient(180deg,#ffa0a0 0%,#f06060 45%,#e04040 100%)!important;box-shadow:0 0 18px rgba(248,113,113,.7)!important;}
.kl{font-family:Georgia,serif;font-size:.68rem;color:#999;font-style:italic;pointer-events:none;z-index:1;}
.bk{position:absolute;top:0;height:60%;background:linear-gradient(180deg,#242434 0%,#141424 55%,#080814 100%);border:1px solid #555;border-top:none;border-radius:0 0 6px 6px;cursor:pointer;z-index:2;touch-action:manipulation;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;box-shadow:2px 5px 12px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.06);transition:background .07s,transform .07s;}
.bk::before{content:'';position:absolute;top:0;left:2px;right:2px;height:20%;background:linear-gradient(180deg,rgba(255,255,255,.09) 0%,transparent 100%);pointer-events:none;}
.bk.pr{background:linear-gradient(180deg,#323244 0%,#222232 55%,#161626 100%)!important;transform:scaleY(.96) translateY(2px)!important;}
.bk.hl{background:linear-gradient(180deg,#1f60b2 0%,#0f508a 55%,#083870 100%)!important;box-shadow:0 0 14px rgba(125,211,252,.8)!important;}
.bk.cf{background:linear-gradient(180deg,#2d6048 0%,#1d5038 55%,#0d3828 100%)!important;box-shadow:0 0 14px rgba(74,222,128,.8)!important;}
.bk.wf{background:linear-gradient(180deg,#723030 0%,#522020 55%,#381010 100%)!important;box-shadow:0 0 14px rgba(248,113,113,.8)!important;}
.bk .kl{font-size:.52rem;color:#777;}
.nb{position:absolute;left:50%;transform:translateX(-50%);bottom:105%;font-size:1.3rem;font-weight:bold;color:var(--gold-light);text-shadow:0 0 10px rgba(201,168,76,.9);pointer-events:none;z-index:20;white-space:nowrap;animation:nba 1.1s ease-out forwards;}
@keyframes nba{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}25%{opacity:1;transform:translateX(-50%) translateY(-10px) scale(1.15);}100%{opacity:0;transform:translateX(-50%) translateY(-68px) scale(.8);}}
#cc{position:fixed;inset:0;pointer-events:none;z-index:100;overflow:hidden;}
.cp{position:absolute;border-radius:2px;animation:cf linear forwards;}
@keyframes cf{0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}
#mo{position:fixed;inset:0;z-index:50;background:rgba(0,4,20,.78);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .4s;}
#mo.vis{opacity:1;pointer-events:all;}
.mb{background:linear-gradient(135deg,#0d1e40,#060f25);border:1px solid var(--gold);border-radius:20px;padding:26px 34px;text-align:center;max-width:82%;box-shadow:0 0 50px rgba(201,168,76,.25);}
.mb h2{font-size:1.65rem;color:var(--gold-light);margin-bottom:10px;}
.mb p{color:var(--txt);font-size:.93rem;margin-bottom:20px;line-height:1.55;}
.cbtn{display:inline-block;padding:10px 28px;font-size:.93rem;border:1px solid var(--gold);border-radius:10px;background:linear-gradient(160deg,rgba(28,48,90,.95),rgba(10,22,55,.95));color:var(--gold-light);font-family:Georgia,serif;cursor:pointer;-webkit-appearance:none;appearance:none;}
</style>
</head>
<body>
<div id="por"><div class="ri"></div><p>Bitte Gerät drehen.<br><span style="font-size:.85rem;color:var(--muted)">Diese App läuft im Querformat.</span></p></div>
<div id="app">
  <div id="sb">
    <div id="sb-logo">
      <svg viewBox="0 0 32 40" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="13" y="0" width="6" height="4" fill="#c9a84c"/><rect x="11" y="4" width="10" height="3" fill="#c9a84c"/>
        <rect x="12" y="7" width="8" height="14" fill="#d4b05a"/><rect x="10" y="21" width="12" height="2" fill="#c9a84c"/>
        <rect x="9" y="23" width="14" height="14" fill="#c0a040" rx="1"/><rect x="11" y="25" width="10" height="10" fill="#071828"/>
        <circle cx="16" cy="30" r="4" fill="none" stroke="#c9a84c" stroke-width="1"/>
        <line x1="16" y1="30" x2="16" y2="27.5" stroke="#c9a84c" stroke-width=".8"/>
        <line x1="16" y1="30" x2="18.5" y2="30" stroke="#c9a84c" stroke-width=".8"/>
        <rect x="7" y="37" width="18" height="3" fill="#c9a84c" rx="1"/>
      </svg>
      <span class="lt">Big Ben<br>Trainer</span><span class="ls">RS Weilheim · © F. Steyer</span>
    </div>
    <div class="hint">🔔 Beobachte &amp; höre –<br>spiele dann nach</div>
    <button class="btn" id="btnPlay">▶ Melodie<br>vorspielen</button>
    <button class="btn" id="btnLearn">🎯 Lern-<br>modus</button>
    <button class="btn" id="btnFree">🎹 Freies<br>Üben</button>
    <div id="dots"></div><div class="sp"></div>
    <div id="status" class="inf">Tippe auf<br>„Melodie<br>vorspielen"</div>
    <div style="display:flex;justify-content:center;padding-top:4px;">
      <svg width="40" height="26" viewBox="0 0 40 26" style="border-radius:3px;border:1px solid #555;">
        <rect width="40" height="26" fill="#012169"/>
        <line x1="0" y1="0" x2="40" y2="26" stroke="white" stroke-width="4.5"/>
        <line x1="40" y1="0" x2="0" y2="26" stroke="white" stroke-width="4.5"/>
        <line x1="0" y1="0" x2="40" y2="26" stroke="#C8102E" stroke-width="2.8"/>
        <line x1="40" y1="0" x2="0" y2="26" stroke="#C8102E" stroke-width="2.8"/>
        <rect x="16" y="0" width="8" height="26" fill="white"/><rect x="0" y="9" width="40" height="8" fill="white"/>
        <rect x="17" y="0" width="6" height="26" fill="#C8102E"/><rect x="0" y="10" width="40" height="6" fill="#C8102E"/>
      </svg>
    </div>
  </div>
  <div id="kw"><div id="kb"></div></div>
</div>
<div id="cc"></div>
<div id="mo"><div class="mb"><h2>🎉 Bravo!</h2><p id="winMsg">Super!</p><button class="cbtn" id="btnClose">Nochmal üben</button></div></div>

/* Töne über Audio-Elemente abspielen – iOS-sicher
   WICHTIG: iOS erlaubt nur ca. 4 gleichzeitige Audio-Instanzen.
   Loesung: Ein Audio-Objekt pro Note vorab erstellen, wiederverwenden
   (pause + currentTime=0 + play). Kein new Audio() beim Abspielen. */
var audioCache = {};

function preloadAudio() {
  var keys = Object.keys(SOUNDS);
  for (var k = 0; k < keys.length; k++) {
    var id = keys[k];
    var a = new Audio(SOUNDS[id]);
    a.volume = 0.85;
    a.preload = 'auto';
    audioCache[id] = a;
  }
}

function playNote(id) {
  var a = audioCache[id];
  if (!a) return;
  /* Stoppen, zurueckspulen, neu starten */
  try {
    a.pause();
    a.currentTime = 0;
    a.play().catch(function(){});
  } catch(e) {}
}

/* Vibration */
function vib() { try { if (navigator.vibrate) navigator.vibrate(20); } catch(e) {} }

/* Westminster C-Dur Melodie + Rhythmus (Viertel/Halbe bei BPM 76) */
var BPM  = 54;
var BEAT = 60000 / BPM;
var MELODY_SEQ = [
  {n:'E5',d:1},{n:'D5',d:1},{n:'C5',d:1},{n:'G4',d:2},{n:null,d:1},
  {n:'G4',d:1},{n:'C5',d:1},{n:'D5',d:1},{n:'E5',d:2},{n:null,d:1},
  {n:'E5',d:1},{n:'C5',d:1},{n:'D5',d:1},{n:'G4',d:2},{n:null,d:1},
  {n:'G4',d:1},{n:'D5',d:1},{n:'E5',d:1},{n:'C5',d:2}
];
var MELODY = [];
for (var _i=0;_i<MELODY_SEQ.length;_i++) { if(MELODY_SEQ[_i].n) MELODY.push(MELODY_SEQ[_i].n); }

var KEYS = [
  {id:'C4',l:'C',b:false},{id:'Db4',l:'Db',b:true},{id:'D4',l:'D',b:false},{id:'Eb4',l:'Eb',b:true},
  {id:'E4',l:'E',b:false},{id:'F4',l:'F',b:false},{id:'Gb4',l:'Gb',b:true},{id:'G4',l:'G',b:false},
  {id:'Ab4',l:'Ab',b:true},{id:'A4',l:'A',b:false},{id:'Bb4',l:'Bb',b:true},{id:'B4',l:'H',b:false},
  {id:'C5',l:'C',b:false},{id:'Db5',l:'Db',b:true},{id:'D5',l:'D',b:false},{id:'Eb5',l:'Eb',b:true},
  {id:'E5',l:'E',b:false},{id:'F5',l:'F',b:false},{id:'Gb5',l:'Gb',b:true},{id:'G5',l:'G',b:false},
  {id:'Ab5',l:'Ab',b:true},{id:'A5',l:'A',b:false},{id:'Bb5',l:'Bb',b:true},{id:'B5',l:'H',b:false},
  {id:'C6',l:'C',b:false}
];

var mode='idle', step=0, errors=0, demoTimer=null;

/* Tastendruck */
function pressKey(id) {
  playNote(id); vib(); bubble(id);
  if (mode==='learn') checkStep(id);
  else flashCls(id,'pr',150);
}

/* Klaviatur bauen */
function buildKb() {
  var kb=document.getElementById('kb'); kb.innerHTML='';
  var whites=KEYS.filter(function(k){return !k.b;}), wCount=whites.length;
  whites.forEach(function(k){
    var el=document.createElement('div');
    el.className='wk'; el.id='K'+k.id;
    el.innerHTML='<span class="kl">'+k.l+'</span>';
    el.addEventListener('touchstart',function(e){e.preventDefault();pressKey(k.id);},{passive:false});
    el.addEventListener('click',function(){pressKey(k.id);});
    kb.appendChild(el);
  });
  KEYS.forEach(function(k,idx){
    if(!k.b) return;
    var wLeft=0; for(var j=0;j<idx;j++){if(!KEYS[j].b)wLeft++;}
    var ww=100/wCount, left=(wLeft-0.31)*ww, bw=ww*0.62;
    var el=document.createElement('div');
    el.className='bk'; el.id='K'+k.id;
    el.style.left=left+'%'; el.style.width=bw+'%';
    el.innerHTML='<span class="kl">'+k.l+'</span>';
    el.addEventListener('touchstart',function(e){e.preventDefault();pressKey(k.id);},{passive:false});
    el.addEventListener('click',function(){pressKey(k.id);});
    kb.appendChild(el);
  });
}

function getEl(id){return document.getElementById('K'+id);}
function flashCls(id,cls,ms){var el=getEl(id);if(!el)return;el.classList.add(cls);setTimeout(function(){el.classList.remove(cls);},ms||450);}
function hlOn(id){var el=getEl(id);if(el)el.classList.add('hl');}
function hlOff(id){var el=getEl(id);if(el)el.classList.remove('hl');}

function bubble(id){
  var el=getEl(id); if(!el)return;
  var k=KEYS.find(function(x){return x.id===id;});
  el.querySelectorAll('.nb').forEach(function(b){b.remove();});
  var b=document.createElement('div'); b.className='nb';
  b.textContent=k?k.l:id; el.appendChild(b);
  b.addEventListener('animationend',function(){b.remove();});
}

function setStatus(t,c){var el=document.getElementById('status');el.textContent=t;el.className=c||'inf';}
function updBtns(){
  document.getElementById('btnPlay').classList.toggle('am',mode==='demo');
  document.getElementById('btnLearn').classList.toggle('am',mode==='learn');
  document.getElementById('btnFree').classList.toggle('am',mode==='free');
}

/* Demo */
function startDemo(){
  if(mode==='demo')return;
  stopDemo(); mode='demo'; updBtns(); setStatus('🔔 Melodie läuft …','inf');
  var i=0, lastNote=null;
  function nx(){
    if(lastNote){hlOff(lastNote);lastNote=null;}
    if(i>=MELODY_SEQ.length){mode='idle';updBtns();setStatus('Dein Zug! → Lernmodus','inf');return;}
    var entry=MELODY_SEQ[i]; i++;
    if(entry.n){hlOn(entry.n);lastNote=entry.n;playNote(entry.n);bubble(entry.n);}
    demoTimer=setTimeout(nx, entry.d*BEAT);
  }
  nx();
}
function stopDemo(){if(demoTimer){clearTimeout(demoTimer);demoTimer=null;}MELODY.forEach(function(n){hlOff(n);});}

/* Lernmodus */
function startLearn(){
  stopDemo(); mode='learn'; step=0; errors=0; updBtns();
  var c=document.getElementById('dots'); c.innerHTML='';
  MELODY.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===0?' cur':''); d.id='dot'+i; c.appendChild(d);
  });
  setStatus('🎯 Spiele die Melodie!','inf');
}

function updDots(s){
  MELODY.forEach(function(_,i){
    var d=document.getElementById('dot'+i); if(!d)return;
    d.classList.remove('done','cur');
    if(i<s)d.classList.add('done'); else if(i===s)d.classList.add('cur');
  });
}

function checkStep(id){
  var exp=MELODY[step];
  if(id===exp){
    flashCls(id,'cf',500);
    var dot=document.getElementById('dot'+step);
    if(dot){dot.classList.remove('cur');dot.classList.add('done');}
    step++;
    if(step>=MELODY.length){
      setTimeout(function(){
        mode='idle'; updBtns();
        if(errors<=1) showWin();
        else { setStatus('Fast! '+errors+' Fehler – nochmal!','err'); setTimeout(startLearn,2000); }
      },300);
    } else { updDots(step); setStatus('✅ Richtig! Weiter!','ok'); }
  } else {
    errors++;
    flashCls(id,'wf',620);
    var ek=KEYS.find(function(k){return k.id===exp;}); 
    setStatus('❌ Fehler '+errors+' – erwartet: '+(ek?ek.l:exp),'err');
    setTimeout(function(){if(mode==='learn')flashCls(exp,'hl',900);},450);
  }
}

/* Freies Üben */
function startFree(){
  stopDemo(); mode='free'; step=0; errors=0;
  document.getElementById('dots').innerHTML='';
  updBtns(); setStatus('🎹 Freies Üben!','inf');
}

/* Gewinn */
function showWin(){
  var msg=errors===0?'Perfekt – kein einziger Fehler! 🌟':'Fast perfekt – nur 1 Fehler! Super!';
  document.getElementById('winMsg').textContent=msg;
  var c=document.getElementById('cc'); c.innerHTML='';
  var cols=['#c9a84c','#f0d882','#f87171','#4ade80','#7dd3fc','#c084fc','#fb923c','#fff'];
  for(var i=0;i<90;i++){
    var p=document.createElement('div'); p.className='cp';
    var sz=7+Math.random()*9;
    p.style.cssText='left:'+Math.random()*100+'vw;top:-14px;background:'+cols[Math.floor(Math.random()*cols.length)]+';width:'+sz+'px;height:'+sz+'px;border-radius:'+(Math.random()>.5?'50%':'2px')+';animation-duration:'+(2.2+Math.random()*2.5)+'s;animation-delay:'+(Math.random()*1.3)+'s;';
    c.appendChild(p);
    (function(el){el.addEventListener('animationend',function(){el.remove();});})(p);
  }
  document.getElementById('mo').classList.add('vis');
}
function closeWin(){document.getElementById('mo').classList.remove('vis');startLearn();}

/* Orientierung */
function chkOr(){document.getElementById('por').classList.toggle('hide',window.innerWidth>window.innerHeight);}
window.addEventListener('resize',chkOr);
window.addEventListener('orientationchange',function(){setTimeout(chkOr,200);});

/* Buttons */
function addBtn(id,fn){
  var el=document.getElementById(id), fired=false;
  el.addEventListener('touchstart',function(e){e.preventDefault();fired=true;fn();setTimeout(function(){fired=false;},500);},{passive:false});
  el.addEventListener('click',function(){if(!fired)fn();});
}

document.addEventListener('DOMContentLoaded',function(){
  preloadAudio(); buildKb(); chkOr();
  addBtn('btnPlay',startDemo);
  addBtn('btnLearn',startLearn);
  addBtn('btnFree',startFree);
  addBtn('btnClose',closeWin);
});
</script>
</body>
